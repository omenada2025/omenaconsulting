<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Product & UI/UX Pulse Dashboard</title>
  <style>
    :root{--ink:#17212b;--muted:#66727c;--line:#d9e1e6;--bg:#f6f8f7;--green:#4f9b76;--amber:#d59d2f;--red:#a3163d;--blue:#4e7896;--card:#ffffffee}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;color:var(--ink);background:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px),var(--bg);background-size:24px 24px}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:#ffffffd9;border-right:1px solid var(--line);padding:22px;position:sticky;top:0;height:100vh}.brand{display:flex;gap:12px;align-items:center;margin-bottom:28px}.mark{background:var(--ink);color:white;border-radius:8px;width:38px;height:38px;display:grid;place-items:center;font-weight:800}h1,h2,h3,p{margin:0}h1{font-size:19px;line-height:1.1}h2{font-size:29px}.muted{color:var(--muted)}.small{font-size:12px;line-height:1.4}.tab,.btn{border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);padding:10px 12px;cursor:pointer}.tab{width:100%;text-align:left;margin:5px 0}.tab.active,.btn.primary{background:var(--ink);color:white;border-color:var(--ink)}.btn.danger{color:var(--red);border-color:#efc2cf}.side-actions{position:absolute;left:22px;right:22px;bottom:20px;display:grid;gap:8px}main{padding:28px}.header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px}.view{display:none}.view.active{display:block}.grid{display:grid;gap:16px}.metrics{grid-template-columns:repeat(4,minmax(150px,1fr));margin:18px 0}.two{grid-template-columns:1.2fr .8fr}.three{grid-template-columns:repeat(3,1fr);margin-top:16px}.panel{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 14px 32px #1f2a3314;padding:18px}.metric strong{display:block;font-size:34px;margin-top:8px}.chip{display:inline-flex;gap:7px;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}.chip:before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor}.green{color:var(--green);background:#e3f1e9}.amber{color:var(--amber);background:#fff0cf}.red{color:var(--red);background:#f8e5eb}.blue{color:var(--blue);background:#e5eff4}.gray{color:#66727c;background:#eef1f2}.status{display:grid;grid-template-columns:1fr auto;gap:12px;border:1px solid var(--line);border-radius:8px;background:white;padding:12px;margin-top:10px}.progress{height:9px;background:#edf1f2;border-radius:99px;overflow:hidden;margin-top:8px}.bar{height:100%;background:var(--green)}.bar.amber{background:var(--amber)}.bar.red{background:var(--red)}.risk{height:360px;border:1px solid var(--line);border-radius:8px;position:relative;background:linear-gradient(90deg,#4f9b7612,#d59d2f12,#a3163d12),white;overflow:hidden}.risk:before{content:"";position:absolute;left:50%;top:0;bottom:0;border-left:1px solid var(--line)}.risk:after{content:"";position:absolute;top:50%;left:0;right:0;border-top:1px solid var(--line)}.point{position:absolute;transform:translate(-50%,-50%);width:170px;background:white;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 20px #1f2a3324;padding:8px;font-size:10px}.point strong{display:block;font-size:11px}form{display:grid;gap:14px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}label{display:grid;gap:6px;font-size:13px;font-weight:700}input,select,textarea{border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit}textarea{min-height:88px}.full{grid-column:1/-1}.reports{display:grid;gap:10px}.report{border:1px solid var(--line);border-radius:8px;background:white;padding:13px;cursor:pointer}.report.selected{outline:2px solid var(--ink)}.timeline{display:grid;gap:12px}.item{display:grid;grid-template-columns:26px 1fr;gap:10px}.node{width:24px;height:24px;border-radius:50%;background:var(--ink);color:white;display:grid;place-items:center;font-size:12px;font-weight:800}.empty{border:1px dashed var(--line);border-radius:8px;padding:28px;text-align:center;color:var(--muted);background:#ffffffcc}@media(max-width:900px){.app,.metrics,.two,.three,.form-grid{grid-template-columns:1fr}.side{position:static;height:auto}.side-actions{position:static;margin-top:20px}main{padding:18px}.header{display:block}.header .btn{margin-top:12px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="mark">PU</div><div><h1>Product & UI/UX Pulse</h1><p class="muted small">Portfolio status dashboard</p></div></div>
    <button class="tab active" data-view="dashboard">Dashboard</button>
    <button class="tab" data-view="add">Add Status</button>
    <button class="tab" data-view="reports">Source Reports</button>
    <div class="side-actions"><button class="btn" id="exportBtn">Export JSON</button><button class="btn danger" id="reloadBtn">Reload</button></div>
  </aside>
  <main>
    <section id="dashboard" class="view active">
      <div class="header"><div><h2>Product & UI/UX Dashboard</h2><p id="subtitle" class="muted">Loading Supabase data...</p></div><button class="btn primary" data-jump="add">Add Product Status</button></div>
      <div id="metrics" class="grid metrics"></div>
      <div class="grid two"><div class="panel"><h3>Portfolio Health</h3><div id="health"></div></div><div class="panel"><h3>Risk Radar</h3><div id="risk" class="risk"></div></div></div>
      <div class="grid three"><div class="panel"><h3>Wins</h3><div id="wins" class="timeline"></div></div><div class="panel"><h3>Blockers</h3><div id="blockers" class="timeline"></div></div><div class="panel"><h3>Next Actions</h3><div id="nexts" class="timeline"></div></div></div>
    </section>
    <section id="add" class="view">
      <div class="header"><div><h2>Add Status Report</h2><p class="muted">Add a product, delivery, or UI/UX update.</p></div></div>
      <div class="panel"><form id="form"><div class="form-grid">
        <label>Product / workstream<input name="product" required></label><label>Owner<input name="owner"></label><label>Week<input name="week" type="date" required></label>
        <label>Health<select name="health"><option value="green">On Track</option><option value="amber">In Progress</option><option value="red">At Risk</option><option value="gray">Paused</option></select></label>
        <label>Progress<input name="progress" type="number" min="0" max="100" value="60"></label><label>Stage<input name="stage" value="Discovery"></label>
        <label class="full">Summary<textarea name="summary" required></textarea></label><label>Win<textarea name="win"></textarea></label><label>Blocker<textarea name="blocker"></textarea></label><label>Next action<textarea name="next"></textarea></label>
        <label>Impact<select name="impact"><option value="1">Low</option><option value="2">Medium</option><option value="3">High</option></select></label><label>Time<select name="time"><option value="1">Short</option><option value="2">Medium</option><option value="3">Long</option></select></label><label>Priority<select name="priority"><option>Normal</option><option>High</option><option>Critical</option></select></label>
      </div><div style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn primary" id="saveBtn">Save Report</button></div></form></div>
    </section>
    <section id="reports" class="view"><div class="header"><div><h2>Source Reports</h2><p class="muted">Shared reports from Supabase.</p></div></div><div class="grid two"><div class="panel"><div id="reportList" class="reports"></div></div><div class="panel" id="detail"><div class="empty">Select a report.</div></div></div></section>
  </main>
</div>
<script src="./supabase-config.js"></script>
<script>
const labels={green:"On Track",amber:"In Progress",red:"At Risk",gray:"Paused"};
const cfg=window.SUPABASE_CONFIG||{}, table=cfg.table||"status_reports", base=cfg.url?`${cfg.url.replace(/\/$/,"")}/rest/v1/${table}`:"";
let reports=[], selected=null;
function cls(r){return r.health==="red"||r.priority==="Critical"?"red":r.health==="amber"?"amber":r.health==="gray"?"gray":"green"}
function esc(v=""){return String(v).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
async function api(path="",opts={}){if(!cfg.url||!cfg.anonKey)throw Error("Missing Supabase config");const h={apikey:cfg.anonKey,Authorization:`Bearer ${cfg.anonKey}`,"Content-Type":"application/json",Prefer:opts.prefer||"return=representation"};const r=await fetch(base+path,{method:opts.method||"GET",headers:h,body:opts.body?JSON.stringify(opts.body):undefined});if(!r.ok)throw Error(await r.text());return r.status===204?null:r.json()}
function db(r){return{product:r.product,owner:r.owner||null,week:r.week,health:r.health,progress:+r.progress||0,stage:r.stage||"Discovery",priority:r.priority||"Normal",impact:+r.impact||1,time:+r.time||1,summary:r.summary,win:r.win||null,blocker:r.blocker||null,next:r.next||null}}
async function load(){try{reports=await api("?select=*&order=week.desc,created_at.desc",{prefer:""});selected=reports[0]?.id||null;render("Synced with Supabase")}catch(e){console.error(e);render("Could not load Supabase data")}}
async function create(r){const data=await api("?select=*",{method:"POST",body:db(r)});reports=[data[0],...reports];selected=data[0].id;render("Saved to Supabase")}
async function remove(id){await api(`?id=eq.${encodeURIComponent(id)}`,{method:"DELETE",prefer:"return=minimal"});reports=reports.filter(r=>r.id!==id);selected=reports[0]?.id||null;render("Deleted from Supabase")}
function render(status){const weeks=reports.map(r=>r.week).sort(),latest=weeks.at(-1)||"";subtitle.textContent=latest?`Latest week: ${latest} - ${reports.length} product and UI/UX updates - ${status}.`:`${status}.`;const total=reports.length,on=reports.filter(r=>r.health==="green").length,risk=reports.filter(r=>r.health==="red"||r.priority==="Critical").length,avg=total?Math.round(reports.reduce((s,r)=>s+(+r.progress||0),0)/total):0;metrics.innerHTML=[["Tracks",total,"blue"],["On Track",on,"green"],["At Risk",risk,risk?"red":"green"],["Avg Progress",avg+"%",avg<50?"red":avg<75?"amber":"green"]].map(m=>`<div class="panel metric"><span class="chip ${m[2]}">${m[0]}</span><strong>${m[1]}</strong></div>`).join("");health.innerHTML=reports.slice().sort((a,b)=>({red:0,amber:1,gray:2,green:3}[a.health]-{red:0,amber:1,gray:2,green:3}[b.health])).map(r=>`<div class="status"><div><b>${esc(r.product)}</b><p class="muted small">${esc(r.owner||"Unassigned")} - ${esc(r.stage)} - ${esc(r.summary)}</p><div class="progress"><div class="bar ${cls(r)}" style="width:${+r.progress||0}%"></div></div></div><span class="chip ${cls(r)}">${labels[r.health]||r.health}</span></div>`).join("")||`<div class="empty">No reports.</div>`;riskRadar();list("wins","win");list("blockers","blocker");list("nexts","next");renderReports()}
function riskRadar(){const pos=[[78,24],[44,28],[24,49],[69,55],[36,76]];risk.innerHTML="";reports.filter(r=>r.blocker).sort((a,b)=>({Critical:3,High:2,Normal:1}[b.priority||"Normal"]-({Critical:3,High:2,Normal:1}[a.priority||"Normal"]))).slice(0,5).forEach((r,i)=>{let p=document.createElement("div");p.className=`point ${cls(r)}`;p.style.left=pos[i][0]+"%";p.style.top=pos[i][1]+"%";p.innerHTML=`<strong>${esc(r.product)}</strong>${esc(r.blocker)}`;risk.appendChild(p)})}
function list(id,key){const items=reports.filter(r=>r[key]).slice(0,6);document.getElementById(id).innerHTML=items.map((r,i)=>`<div class="item"><div class="node">${i+1}</div><div><b>${esc(r.product)}</b><p class="muted small">${esc(r[key])}</p></div></div>`).join("")||`<div class="empty">None captured.</div>`}
function renderReports(){reportList.innerHTML=reports.map(r=>`<div class="report ${r.id===selected?"selected":""}" data-id="${r.id}"><b>${esc(r.product)}</b><p class="small muted">${esc(r.owner||"Unassigned")} - ${esc(r.week)}</p><p class="small">${esc(r.summary)}</p></div>`).join("");const r=reports.find(x=>x.id===selected);detail.innerHTML=r?`<h3>${esc(r.product)}</h3><p class="muted small">${esc(r.owner||"Unassigned")} - ${esc(r.week)} - ${esc(r.stage)}</p><p><b>Summary</b><br>${esc(r.summary)}</p><p><b>Win</b><br>${esc(r.win||"")}</p><p><b>Blocker</b><br>${esc(r.blocker||"")}</p><p><b>Next</b><br>${esc(r.next||"")}</p><button class="btn danger" onclick="remove('${r.id}')">Delete</button>`:`<div class="empty">Select a report.</div>`}
document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>{document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id===b.dataset.view));document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t===b))});document.querySelectorAll("[data-jump]").forEach(b=>b.onclick=()=>document.querySelector(`[data-view="${b.dataset.jump}"]`).click());
form.onsubmit=async e=>{e.preventDefault();saveBtn.textContent="Saving...";const r=Object.fromEntries(new FormData(form));try{await create({...r,progress:+r.progress,impact:+r.impact,time:+r.time});form.reset();form.week.valueAsDate=new Date();document.querySelector('[data-view="dashboard"]').click()}catch(err){alert("Could not save. Check Supabase settings.");console.error(err)}finally{saveBtn.textContent="Save Report"}};
reportList.onclick=e=>{const c=e.target.closest(".report");if(c){selected=c.dataset.id;render("Synced with Supabase")}};exportBtn.onclick=()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(reports,null,2)],{type:"application/json"}));a.download="portfolio-pulse-reports.json";a.click()};reloadBtn.onclick=load;form.week.valueAsDate=new Date();load();
</script>
</body>
</html>
